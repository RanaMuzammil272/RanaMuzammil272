<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rana Muzammil - Software Engineer, Enterprise Java and AI">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0F0B"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39D353" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#39D353" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39D353" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39D353" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#39D353" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dotGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#39D353" fill-opacity="0.14"/>
    </pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <rect width="1200" height="300" fill="url(#dotGrid)"/>

  <!-- glow behind right-side badges -->
  <circle cx="1000" cy="150" r="150" fill="url(#glow)" filter="url(#soft)"/>

  <!-- code window -->
  <rect x="60" y="40" width="760" height="220" rx="14" fill="#12161C" stroke="#2B3138" stroke-width="1.5"/>

  <!-- title bar -->
  <circle cx="92" cy="60" r="6" fill="#FF5F56"/>
  <circle cx="114" cy="60" r="6" fill="#FFBD2E"/>
  <circle cx="136" cy="60" r="6" fill="#27C93F"/>
  <text x="440" y="65" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#8A93A1">profile.js</text>
  <line x1="60" y1="79" x2="820" y2="79" stroke="#262C34" stroke-width="1"/>

  <!-- code content -->
  <g font-family="'Cascadia Code','Fira Code',Consolas,'Courier New',monospace" font-size="16" xml:space="preserve">
    <text x="90" y="106" fill="#6B7280" font-style="italic">// hi, I&#8217;m</text>

    <text x="90" y="132">
      <tspan fill="#C792EA">const</tspan><tspan fill="#B2BAC2"> engineer = {</tspan>
    </text>

    <text x="90" y="158">
      <tspan fill="#E5C07B">&#160;&#160;name</tspan><tspan fill="#B2BAC2">: </tspan><tspan fill="#9ECE6A">"Rana Muzammil",</tspan>
    </text>

    <text x="90" y="184">
      <tspan fill="#E5C07B">&#160;&#160;role</tspan><tspan fill="#B2BAC2">: </tspan><tspan fill="#9ECE6A">"Software Engineer @ i2c",</tspan>
    </text>

    <text x="90" y="210">
      <tspan fill="#E5C07B">&#160;&#160;focus</tspan><tspan fill="#B2BAC2">: [</tspan><tspan fill="#9ECE6A">"Enterprise Java", "Full-Stack", "Generative AI"</tspan><tspan fill="#B2BAC2">],</tspan>
    </text>

    <text x="90" y="236">
      <tspan fill="#E5C07B">&#160;&#160;status</tspan><tspan fill="#B2BAC2">: </tspan><tspan fill="#39D353">"open to opportunities"</tspan><tspan fill="#39D353">&#160;<animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>&#9608;</tspan>
    </text>

    <text x="90" y="262" fill="#B2BAC2">};</text>
  </g>

  <!-- right-side focus badges -->
  <text x="1000" y="86" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" letter-spacing="2" fill="#6B7280">TECH FOCUS</text>

  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="600">
    <rect x="880" y="103" width="240" height="36" rx="18" fill="#39D353" fill-opacity="0.08" stroke="#39D353" stroke-opacity="0.45"/>
    <text x="1000" y="126" text-anchor="middle" fill="#39D353">ENTERPRISE JAVA</text>

    <rect x="880" y="151" width="240" height="36" rx="18" fill="#39D353" fill-opacity="0.08" stroke="#39D353" stroke-opacity="0.45"/>
    <text x="1000" y="174" text-anchor="middle" fill="#39D353">FULL-STACK MERN</text>

    <rect x="880" y="199" width="240" height="36" rx="18" fill="#39D353" fill-opacity="0.08" stroke="#39D353" stroke-opacity="0.45"/>
    <text x="1000" y="222" text-anchor="middle" fill="#39D353">GENERATIVE AI</text>
  </g>

  <!-- bottom accent -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accentBar)"/>
</svg>
